<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- dark background circle -->
  <circle cx="32" cy="32" r="32" fill="#0f172a"/>
  <!-- globe -->
  <circle cx="32" cy="32" r="18" fill="#1e40af" opacity="0.9"/>
  <!-- globe lines -->
  <ellipse cx="32" cy="32" rx="18" ry="8" fill="none" stroke="#3b82f6" stroke-width="1.2" opacity="0.6"/>
  <line x1="14" y1="32" x2="50" y2="32" stroke="#3b82f6" stroke-width="1.2" opacity="0.6"/>
  <line x1="32" y1="14" x2="32" y2="50" stroke="#3b82f6" stroke-width="1.2" opacity="0.6"/>
  <!-- cloud -->
  <circle cx="28" cy="28" r="7" fill="#e2e8f0"/>
  <circle cx="34" cy="26" r="8" fill="#f1f5f9"/>
  <circle cx="40" cy="29" r="5.5" fill="#e2e8f0"/>
  <rect x="22" y="29" width="23" height="8" rx="2" fill="#e2e8f0"/>
  <!-- rain drops -->
  <line x1="27" y1="39" x2="25" y2="45" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  <line x1="33" y1="39" x2="31" y2="45" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  <line x1="39" y1="39" x2="37" y2="45" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
</svg>
