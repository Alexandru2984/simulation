limit_req_zone  $binary_remote_addr zone=sim_inject:10m rate=10r/m;
limit_req_zone  $binary_remote_addr zone=sim_api:10m    rate=30r/m;
limit_req_zone  $binary_remote_addr zone=sim_ws_req:10m rate=60r/m;
limit_conn_zone $binary_remote_addr zone=sim_ws_conn:10m;

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name simulation.micutu.com;

    root /home/micu/simulation/frontend/dist;
    index index.html;
    server_tokens off;
    client_max_body_size 64k;

    ssl_certificate /etc/letsencrypt/live/simulation.micutu.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/simulation.micutu.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    include /etc/nginx/snippets/simulation-security-headers.conf;

    location /api/grid/inject {
        limit_req zone=sim_inject burst=5 nodelay;
        proxy_pass http://127.0.0.1:8094;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        limit_req zone=sim_api burst=20 nodelay;
        proxy_pass http://127.0.0.1:8094;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        limit_req zone=sim_ws_req burst=3 nodelay;
        limit_conn sim_ws_conn 10;
        proxy_pass http://127.0.0.1:8094;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        include /etc/nginx/snippets/simulation-security-headers.conf;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }

    location /assets/ {
        include /etc/nginx/snippets/simulation-security-headers.conf;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name simulation.micutu.com;
    return 301 https://$host$request_uri;
}
